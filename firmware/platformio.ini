; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = stamps3A

[env]
monitor_speed = 115200

build_flags = -D V_MAJ=3
			  -D V_MIN=3
			  -D V_PATCH=1
			  -D CONFIG_ASYNC_TCP_QUEUE_SIZE=128
			  -D WS_MAX_QUEUED_MESSAGES=64
			  
lib_deps = 
	robotis-git/Dynamixel2Arduino@^0.6.1
	thijse/ArduinoLog@^1.1.1
	madhephaestus/ESP32Servo@^3.0.9
	https://github.com/ArminJo/ServoEasing.git#v3.6.0

	thomasfredericks/Chrono @ ^1.2.0
	https://github.com/ESP32Async/ESPAsyncWebServer#v3.7.10
	https://github.com/IPdotSetAF/ESPAsyncHTTPUpdateServer#v3.0.0
	https://github.com/bblanchon/ArduinoJson#v7.3.1
	https://github.com/bblanchon/ArduinoStreamUtils#v1.9.0
	
	https://github.com/ayushsharma82/WebSerial#v2.1.2 
	https://github.com/ripred/CodeSizeProfiler#v1.0.2
	https://github.com/ripred/Profiler#Profiler-v6

	https://github.com/adafruit/Adafruit_VL53L0X#1.2.5
	https://github.com/Starmbi/hp_BH1750#1.0.2
	https://github.com/adafruit/Adafruit_SGP30#2.0.3
	https://github.com/pololu/vl53l1x-arduino/#1.3.1
	https://github.com/RobTillaart/TCA9548#0.3.1
	https://github.com/adafruit/Adafruit_INA219
	https://github.com/adafruit/Adafruit_MAX1704X
	https://github.com/RobTillaart/INA219
[esp32]
platform = espressif32 @ 6.12.0
framework = arduino
monitor_filters = esp32_exception_decoder, log2file
build_unflags = -std=gnu++11
build_flags = -std=gnu++17

[protoboard]
build_flags = -D PROTOBOARD

[pcb]
build_flags = -D PCB
			  ${env.build_flags}

[env:adafruit_feather_protoboard]
extends = esp32 , protoboard

[env:adafruit_feather_pcb]
extends = esp32 , pcb
board = featheresp32
build_type = debug
build_flags = ;-DCORE_DEBUG_LEVEL=4
			  ${pcb.build_flags}
			  ${esp32.build_flags}
			  -D MBK_PORT_COUNT=4

[env:stamps3A]
extends = esp32
board = m5stack-stamps3
build_type = release
build_flags = 
			${env.build_flags}
			${esp32.build_flags}
   			-DARDUINO_USB_CDC_ON_BOOT=1
			-D stamps3A
			-D MBK_PORT_COUNT=5

[env:stamps3A_config_overwrite]
extends = esp32
board = m5stack-stamps3
build_type = release
build_flags = 
			${env.build_flags}
			${esp32.build_flags}
   			-DARDUINO_USB_CDC_ON_BOOT=1
			-D stamps3A
			-D MBK_PORT_COUNT=5
extra_scripts = post:scripts/upload_config.py

[env:stampS3A_Clean]
extends = esp32
board = m5stack-stamps3
build_type = release
build_flags = 
			${env.build_flags}
			${esp32.build_flags}
   			-DARDUINO_USB_CDC_ON_BOOT=1
			-D stamps3A
			-D MBK_PORT_COUNT=5
extra_scripts = pre:scripts/full_clean.py
				post:scripts/upload_config.py


[env:stamps3A_debug]
extends = esp32
board = m5stack-stamps3
build_type = debug
build_flags = 
			${env.build_flags}
			${esp32.build_flags}
   			-DARDUINO_USB_CDC_ON_BOOT=1
			-D stamps3A
			-D MBK_PORT_COUNT=5
			-D SERIAL_CLI
			; -DCORE_DEBUG_LEVEL=5
			;-D LOCAL_TRACE
monitor_filters = esp32_exception_decoder, log2file
